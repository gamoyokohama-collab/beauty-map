<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BEAUTY COLLECTION ブース回遊マップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f0;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* Header */
  .header {
    background: #fff;
    border-bottom: 2px solid #e8c547;
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .event-name { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #b8960a; }
  .user-badge { font-size: 12px; color: #555; background: #f5f5f0; border: 1px solid #ddd; border-radius: 20px; padding: 4px 12px; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 13px; color: #333; font-weight: 500; }
  .progress-count { font-size: 15px; font-weight: 700; color: #b8960a; }
  .bar-bg { height: 6px; background: #eee; border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 6px; background: #e8c547; border-radius: 6px; transition: width 0.4s ease; width: 0%; }

  /* Map */
  .main { padding: 12px; }
  .block-section { margin-bottom: 14px; }
  .block-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #999; text-transform: uppercase; margin-bottom: 6px; padding-left: 2px; }
  .booth-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .booth-cell {
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .booth-cell:active { transform: scale(0.93); }
  .booth-cell.visited { background: #fffbea; border-color: #e8c547; color: #7a6000; }
  .booth-cell.visited::after { content: '✓'; position: absolute; top: 3px; right: 5px; font-size: 9px; color: #b8960a; font-weight: 700; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 0 0 40px; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 4px; margin: 12px auto 20px; }
  .modal-body { padding: 0 20px; }
  .modal-block-tag { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: #b8960a; margin-bottom: 4px; }
  .modal-maker-name { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 16px; line-height: 1.2; }
  .modal-visited-badge { display: none; align-items: center; gap: 6px; font-size: 12px; color: #7a6000; background: #fffbea; border: 1px solid #e8c547; border-radius: 20px; padding: 5px 12px; margin-bottom: 16px; width: fit-content; }
  .modal-visited-badge.show { display: flex; }
  .modal-visited-badge::before { content: ''; width: 7px; height: 7px; background: #b8960a; border-radius: 50%; flex-shrink: 0; }
  .btn-check { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; }
  .btn-check.do { background: #e8c547; color: #3d3000; }
  .btn-check.undo { background: #f5f5f5; color: #888; border: 1.5px solid #ddd; }
  .btn-close-area { text-align: center; margin-top: 12px; }
  .btn-close { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; padding: 4px 16px; }

  /* Complete */
  .complete-banner { display: none; margin: 12px; background: #fffbea; border: 2px solid #e8c547; border-radius: 12px; padding: 16px; text-align: center; }
  .complete-banner.show { display: block; }
  .complete-banner-title { font-size: 16px; font-weight: 700; color: #7a6000; }
  .complete-banner-sub { font-size: 12px; color: #b8960a; margin-top: 4px; }

  /* No ID */
  .no-id-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 32px; text-align: center; }
  .no-id-icon { font-size: 40px; margin-bottom: 16px; color: #ccc; }
  .no-id-title { font-size: 16px; color: #555; margin-bottom: 8px; font-weight: 500; }
  .no-id-sub { font-size: 12px; color: #aaa; line-height: 1.7; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #fff; border: 1.5px solid #e8c547; color: #7a6000; border-radius: 30px; padding: 10px 20px; font-size: 13px; font-weight: 700; z-index: 300; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="event-name">BEAUTY COLLECTION 2026</div>
    <div class="user-badge" id="user-badge">—</div>
  </div>
  <div class="progress-row">
    <span class="progress-label">ブース訪問数</span>
    <span class="progress-count"><span id="cnt">0</span> / <span id="total">0</span></span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
</div>

<div id="no-id" class="no-id-screen" style="display:none;">
  <div class="no-id-icon">⚠</div>
  <div class="no-id-title">入場証から開いてください</div>
  <div class="no-id-sub">このページは入場受付完了後に<br>表示されるリンクからアクセスしてください。</div>
</div>

<div id="app" style="display:none;">
  <div class="complete-banner" id="complete-banner">
    <div class="complete-banner-title">★ 全ブース制覇！★</div>
    <div class="complete-banner-sub">すべての出展メーカーを訪問されました。ありがとうございます！</div>
  </div>
  <div class="main" id="map"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-block-tag" id="m-block"></div>
      <div class="modal-maker-name" id="m-name"></div>
      <div class="modal-visited-badge" id="m-visited">訪問済み</div>
      <button class="btn-check do" id="m-chk">訪問しました ✓</button>
      <div class="btn-close-area">
        <button class="btn-close" id="m-close">閉じる</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">訪問を記録しました ✓</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbymehOYcO4G4msrPDcCZ7q6AlLFLfCRI_b82FIPiAsXZdECMAGHEH3S2bsg92UIQrD3GA/exec";

// ブロック・ブース定義
// エリア分けPDFのエリア記号・並び順に完全準拠
// 図面PDFの配置順（左→右）に準拠
const BLOCKS = [
  {
    id: 'A', label: 'エリア A',
    booths: [
      {n: 'タカラベルモント'},
      {n: 'エステシモ'},
      {n: 'マイクロバブル・ジャパン'},
      {n: 'サインド（Beauty Merit）'},
      {n: 'soeasy'},
      {n: '滝川'},
      {n: '菊星'},
      {n: 'ダイソン'},
      {n: 'AVEDA'},
      {n: 'モロッカンオイルジャパン'},
      {n: 'ガモウ販売促進部'},
    ]
  },
  {
    id: 'B', label: 'エリア B',
    booths: [
      {n: '日本ロレアル'},
      {n: 'アマトラ'},
      {n: 'セフティ'},
      {n: 'リアル化学'},
      {n: 'ミルボン'},
      {n: 'ヘンケルジャパン'},
      {n: 'ニューウェイジャパン'},
      {n: 'アリミノ'},
    ]
  },
  {
    id: 'C', label: 'エリア C',
    booths: [
      {n: 'ホーユー'},
      {n: '武田'},
      {n: '千代田化学'},
      {n: 'ウエラ'},
      {n: 'underbar plus（UnG）'},
      {n: 'GOALD JAPAN'},
      {n: 'ルベル／タカラベルモント'},
    ]
  },
  {
    id: 'D', label: 'エリア D',
    booths: [
      {n: 'TooB'},
      {n: 'ユーグレナ'},
      {n: 'セフィーヌ'},
      {n: 'SHIGETA PARIS'},
      {n: 'MYHONEY'},
      {n: 'コーセープロフェッショナル'},
      {n: 'RadiAct（PROLASH）'},
      {n: 'BJC'},
      {n: 'イムダイン'},
    ]
  },
  {
    id: 'E', label: 'エリア E',
    booths: [
      {n: 'サンコール'},
      {n: 'テクノエイト'},
      {n: 'b-ex'},
      {n: '中野製薬'},
    ]
  },
  {
    id: 'F', label: 'エリア F',
    booths: [
      {n: 'グランクラージュ'},
      {n: 'デミコスメティクス'},
      {n: 'イーラル'},
      {n: 'ナプラ'},
      {n: 'ビーファースト'},
      {n: 'マデナ'},
      {n: 'sinsコスメティクス'},
      {n: 'ハホニコ'},
    ]
  },
  {
    id: 'G', label: 'エリア G',
    booths: [
      {n: '香栄化学'},
      {n: 'ワイマック'},
      {n: '自由が丘クリニック'},
      {n: "F'sビューティー"},
      {n: '野口総合研究所'},
      {n: '日本グランデックス化粧品'},
      {n: 'パシフィックプロダクツ'},
      {n: 'カエタステクノロジー'},
    ]
  },
  {
    id: 'H', label: 'エリア H',
    booths: [
      {n: 'バルクオム'},
      {n: 'アデランス'},
      {n: '日理'},
      {n: 'サクシード'},
      {n: 'フェザー（レオンカ）'},
      {n: '山野美容商事'},
      {n: '内海'},
      {n: '水谷理美容鋏製作所／REUZEL'},
    ]
  },
  {
    id: 'I', label: 'エリア I',
    booths: [
      {n: 'KINUJO'},
      {n: 'Kirala'},
      {n: 'YA-MAN'},
      {n: 'MUK'},
      {n: 'ツインバード'},
      {n: 'アンドナイン'},
      {n: 'JadeJapan（LOA）'},
      {n: 'awaas'},
      {n: 'LOWBAL'},
      {n: '大西'},
      {n: '1DK'},
    ]
  },
];

const TOTAL   = BLOCKS.reduce((s, b) => s + b.booths.length, 0);
const params  = new URLSearchParams(location.search);
const rowId   = params.get('id') || '';
const un      = params.get('un') ? decodeURIComponent(params.get('un')) : '';
const sn      = params.get('sn') ? decodeURIComponent(params.get('sn')) : '';
const lsKey   = 'bc_visited_' + (rowId || 'anon');
const visited = new Set(JSON.parse(localStorage.getItem(lsKey) || '[]'));

let currentKey = null, currentBooth = null, currentBlock = null;

function init() {
  if (!rowId && !un) {
    document.getElementById('no-id').style.display = 'flex';
    return;
  }
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').textContent = un ? un + ' 様' : '参加者';
  document.getElementById('total').textContent = TOTAL;
  renderMap();
  updateProgress();
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';
  BLOCKS.forEach(blk => {
    const sec  = document.createElement('div');
    sec.className = 'block-section';
    const lbl  = document.createElement('div');
    lbl.className = 'block-label';
    lbl.textContent = blk.label;
    const grid = document.createElement('div');
    grid.className = 'booth-grid';
    blk.booths.forEach(b => {
      const key  = blk.id + ':' + b.n;
      const cell = document.createElement('div');
      cell.className = 'booth-cell' + (visited.has(key) ? ' visited' : '');
      cell.textContent = b.n;
      cell.addEventListener('click', () => openModal(key, b, blk));
      grid.appendChild(cell);
    });
    sec.appendChild(lbl);
    sec.appendChild(grid);
    map.appendChild(sec);
  });
}

function updateProgress() {
  const c = visited.size;
  document.getElementById('cnt').textContent = c;
  document.getElementById('bar').style.width = (c / TOTAL * 100).toFixed(1) + '%';
  document.getElementById('complete-banner').className =
    'complete-banner' + (c === TOTAL ? ' show' : '');
}

function openModal(key, b, blk) {
  currentKey = key; currentBooth = b; currentBlock = blk;
  document.getElementById('m-block').textContent = 'BEAUTY COLLECTION — ' + blk.label;
  document.getElementById('m-name').textContent  = b.n;
  const isVisited = visited.has(key);
  document.getElementById('m-visited').className = 'modal-visited-badge' + (isVisited ? ' show' : '');
  const chk = document.getElementById('m-chk');
  chk.textContent = isVisited ? '訪問済みを取り消す' : '訪問しました ✓';
  chk.className   = 'btn-check ' + (isVisited ? 'undo' : 'do');
  document.getElementById('modal').className = 'modal-overlay open';
}

function closeModal() {
  document.getElementById('modal').className = 'modal-overlay';
}

document.getElementById('m-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('m-chk').addEventListener('click', async () => {
  if (!currentKey) return;
  const wasVisited = visited.has(currentKey);
  wasVisited ? visited.delete(currentKey) : visited.add(currentKey);
  localStorage.setItem(lsKey, JSON.stringify([...visited]));
  updateProgress();
  renderMap();
  closeModal();
  if (!wasVisited) {
    showToast('訪問を記録しました ✓');
    sendLog(currentBlock.id, currentBooth.n);
  }
});

async function sendLog(blockId, boothName) {
  if (!rowId) return;
  try {
    const url = GAS_URL
      + '?mode=checkin'
      + '&id='    + encodeURIComponent(rowId)
      + '&un='    + encodeURIComponent(un)
      + '&sn='    + encodeURIComponent(sn)
      + '&block=' + encodeURIComponent(blockId)
      + '&booth=' + encodeURIComponent(boothName);
    await fetch(url, { method: 'GET', mode: 'no-cors' });
  } catch(err) {
    console.warn('ログ送信失敗（端末には保存済み）:', err);
  }
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

init();
</script>
</body>
</html>
