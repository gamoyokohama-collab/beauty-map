<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BEAUTY COLLECTION ブース回遊マップ</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --visited-bg: #1a2e1a;
    --visited-border: #3a6a3a;
    --visited-text: #7ec87e;
    --green: #4caf50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .event-name { font-size: 11px; letter-spacing: 2px; color: var(--accent); font-weight: 500; }
  .user-badge { font-size: 11px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; }
  .progress-nums { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .progress-nums strong { color: var(--accent); font-size: 14px; }
  .bar-bg { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 4px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%); border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); width: 0%; }
  .main { padding: 12px; }
  .block-section { margin-bottom: 10px; }
  .block-label { font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 5px; padding-left: 2px; }
  .booth-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .booth-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .booth-cell:active { transform: scale(0.93); }
  .booth-cell.visited { background: var(--visited-bg); border-color: var(--visited-border); color: var(--visited-text); }
  .booth-cell.visited::after { content: ''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border2); width: 100%; max-width: 480px; padding: 0 0 40px; animation: slideUp 0.25s cubic-bezier(.4,0,.2,1); }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 4px; margin: 12px auto 20px; }
  .modal-body { padding: 0 20px; }
  .modal-block-tag { font-size: 9px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .modal-maker-name { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 16px; line-height: 1.2; }
  .modal-visited-badge { display: none; align-items: center; gap: 6px; font-size: 12px; color: var(--visited-text); background: var(--visited-bg); border: 1px solid var(--visited-border); border-radius: 20px; padding: 5px 12px; margin-bottom: 16px; width: fit-content; }
  .modal-visited-badge.show { display: flex; }
  .modal-visited-badge::before { content: ''; width: 7px; height: 7px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
  .btn-hp { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; border-radius: 10px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 14px; text-decoration: none; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
  .btn-hp-arrow { color: var(--accent); font-size: 12px; }
  .btn-check { width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; -webkit-tap-highlight-color: transparent; }
  .btn-check.do   { background: var(--accent); color: #1a1000; }
  .btn-check.undo { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
  .btn-close-area { text-align: center; margin-top: 14px; }
  .btn-close { font-size: 12px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 4px 16px; }
  .complete-banner { display: none; margin: 12px; background: #1a2e0a; border: 1px solid #3a6a1a; border-radius: 12px; padding: 16px 20px; text-align: center; }
  .complete-banner.show { display: block; }
  .complete-banner-title { font-size: 16px; font-weight: 700; color: #7ec84e; letter-spacing: 1px; }
  .complete-banner-sub   { font-size: 11px; color: #5a8a3a; margin-top: 4px; }
  .no-id-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; padding: 32px; text-align: center; }
  .no-id-icon  { font-size: 40px; margin-bottom: 16px; color: var(--text3); }
  .no-id-title { font-size: 16px; color: var(--text2); margin-bottom: 8px; }
  .no-id-sub   { font-size: 12px; color: var(--text3); line-height: 1.7; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2a3a2a; border: 1px solid var(--visited-border); color: var(--visited-text); border-radius: 30px; padding: 10px 20px; font-size: 13px; font-weight: 500; z-index: 300; transition: transform 0.3s cubic-bezier(.4,0,.2,1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="event-name">BEAUTY COLLECTION 2026</div>
    <div class="user-badge" id="user-badge">—</div>
  </div>
  <div class="progress-nums">
    <span>ブース訪問数</span>
    <span><strong id="cnt">0</strong> / <span id="total">52</span></span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
</div>

<div id="no-id" class="no-id-screen" style="display:none;">
  <div class="no-id-icon">⚠</div>
  <div class="no-id-title">入場証から開いてください</div>
  <div class="no-id-sub">このページは入場受付完了後に<br>表示されるリンクからアクセスしてください。</div>
</div>

<div id="app" style="display:none;">
  <div class="complete-banner" id="complete-banner">
    <div class="complete-banner-title">★ 全ブース制覇！★</div>
    <div class="complete-banner-sub">すべての出展メーカーを訪問されました。ありがとうございます！</div>
  </div>
  <div class="main" id="map"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-body">
      <div class="modal-block-tag" id="m-block"></div>
      <div class="modal-maker-name" id="m-name"></div>
      <div class="modal-visited-badge" id="m-visited">訪問済み</div>
      <a class="btn-hp" id="m-hp" href="#" target="_blank" rel="noopener">
        <span>公式サイトを見る</span>
        <span class="btn-hp-arrow">↗</span>
      </a>
      <button class="btn-check do" id="m-chk">訪問しました ✓</button>
      <div class="btn-close-area">
        <button class="btn-close" id="m-close">閉じる</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">訪問を記録しました</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxAQpELv9UAfazrTv0QoBaIfHO4abDtFluZRgbBP1hxOpdjhZGhgiSDfp-TfsFCG03C/exec";

const BLOCKS = [
  {id:'A', label:'ブロック A', booths:[
    {n:'タカラ',             url:'https://www.takara-belmont.co.jp'},
    {n:'エステシモ',         url:'https://www.estesimo.com'},
    {n:'マイクロバブル',     url:'https://www.microbubble.net'},
    {n:'ビューティメリット', url:'https://www.beautymerit.co.jp'},
    {n:'So easy',           url:''},
    {n:'滝川',               url:''},
    {n:'菊星',               url:'https://www.kikuboshi.co.jp'},
    {n:'ダイソン',           url:'https://www.dyson.co.jp'},
    {n:'AVEDA',             url:'https://www.aveda.co.jp'},
    {n:'モロッカンオイル',   url:'https://www.moroccanoil.jp'},
    {n:'販促企画',           url:''},
  ]},
  {id:'B', label:'ブロック B', booths:[
    {n:'KINUJO',     url:'https://kinujo.jp'},
    {n:'Kirala',     url:'https://kirala.co.jp'},
    {n:'YAMAN',      url:'https://www.yaman.co.jp'},
    {n:'MUK',        url:'https://muk.com.au'},
    {n:'ツインバード', url:'https://www.twinbird.jp'},
    {n:'アンドナイン', url:''},
    {n:'LOA',        url:''},
    {n:'awaas',      url:''},
    {n:'LOBAL',      url:''},
    {n:'大西',        url:''},
  ]},
  {id:'C', label:'ブロック C', booths:[
    {n:'ロレアル',   url:'https://www.lorealprofessionnel.co.jp'},
    {n:'アマトラ',   url:'https://www.amatora.co.jp'},
    {n:'セフティ',   url:''},
    {n:'リアル化学', url:''},
  ]},
  {id:'D', label:'ブロック D', booths:[
    {n:'ミルボン',     url:'https://www.milbon.co.jp'},
    {n:'ヘンケル',     url:'https://www.henkel.co.jp'},
    {n:'ニューウェイ', url:''},
    {n:'アリミノ',     url:'https://www.arimino.co.jp'},
  ]},
  {id:'E', label:'ブロック E', booths:[
    {n:'ホーユー',   url:'https://www.hoyu.co.jp'},
    {n:'武田',       url:''},
    {n:'千代田化学', url:''},
    {n:'TOOB',      url:''},
  ]},
  {id:'F', label:'ブロック F', booths:[
    {n:'ウェラ', url:'https://www.wella.com/ja-JP'},
    {n:'UnG',   url:''},
    {n:'GOALD', url:''},
    {n:'ルベル', url:'https://www.lebel.co.jp'},
  ]},
  {id:'G', label:'ブロック G', booths:[
    {n:'ユーグレナ',   url:'https://www.euglena.jp'},
    {n:'セフィーヌ',   url:'https://www.sefine.co.jp'},
    {n:'SHIGETA',     url:'https://shigeta-paris.jp/ja'},
    {n:'マイハニー',   url:''},
    {n:'コーセー',     url:'https://www.kose.co.jp'},
    {n:'プロラッシュ', url:''},
    {n:'BJC',         url:''},
    {n:'イムダイン',   url:'https://www.imdyne.co.jp'},
  ]},
  {id:'H', label:'ブロック H', booths:[
    {n:'グランクラージュ',       url:''},
    {n:'デミ',                   url:'https://www.demi.co.jp'},
    {n:'イーラル',               url:''},
    {n:'ナプラ',                 url:'https://www.napla.co.jp'},
    {n:'ビーファースト',         url:''},
    {n:'マデナ',                 url:''},
    {n:'Sins',                   url:''},
    {n:'ハホニコ',               url:'https://www.hahoniko.com'},
    {n:'香栄化学',               url:''},
    {n:'ワイマック',             url:''},
    {n:'自由が丘クリニック',     url:''},
    {n:"F'sビューティ",          url:''},
    {n:'野口総合研究所',         url:''},
    {n:'グランテックス',         url:''},
    {n:'パシフィックプロダクツ', url:''},
    {n:'カエタス',               url:''},
  ]},
  {id:'I', label:'ブロック I', booths:[
    {n:'バルクオム',   url:'https://bulkhomme.com'},
    {n:'アデランス',   url:'https://www.aderans.co.jp'},
    {n:'ニチリ',       url:''},
    {n:'サクシード',   url:''},
    {n:'ヤマノ',       url:''},
    {n:'フェザー',     url:'https://www.feather.co.jp'},
    {n:'内海',         url:''},
    {n:'水谷シザー',   url:''},
    {n:'Be-x',        url:''},
    {n:'サンコール',   url:'https://www.suncool.co.jp'},
    {n:'中野製薬',     url:'https://www.nakano-seiyaku.co.jp'},
    {n:'テクノエイト', url:''},
  ]},
];

const TOTAL  = BLOCKS.reduce((s,b) => s + b.booths.length, 0);
const params = new URLSearchParams(location.search);
const rowId  = params.get('id') || '';
const un     = params.get('un') ? decodeURIComponent(params.get('un')) : '';
const sn     = params.get('sn') ? decodeURIComponent(params.get('sn')) : '';
const lsKey  = 'bc_visited_' + (rowId || 'anon');
const visited = new Set(JSON.parse(localStorage.getItem(lsKey) || '[]'));

let currentKey = null, currentBooth = null, currentBlock = null;

function init() {
  if (!rowId) {
    document.getElementById('no-id').style.display = 'flex';
    return;
  }
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').textContent = un ? un + ' 様' : '参加者';
  document.getElementById('total').textContent = TOTAL;
  renderMap();
  updateProgress();
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';
  BLOCKS.forEach(blk => {
    const sec  = document.createElement('div');
    sec.className = 'block-section';
    const lbl  = document.createElement('div');
    lbl.className = 'block-label';
    lbl.textContent = blk.label;
    const grid = document.createElement('div');
    grid.className = 'booth-grid';
    blk.booths.forEach(b => {
      const key  = blk.id + ':' + b.n;
      const cell = document.createElement('div');
      cell.className = 'booth-cell' + (visited.has(key) ? ' visited' : '');
      cell.textContent = b.n;
      cell.addEventListener('click', () => openModal(key, b, blk));
      grid.appendChild(cell);
    });
    sec.appendChild(lbl);
    sec.appendChild(grid);
    map.appendChild(sec);
  });
}

function updateProgress() {
  const c = visited.size;
  document.getElementById('cnt').textContent = c;
  document.getElementById('bar').style.width = (c / TOTAL * 100).toFixed(1) + '%';
  document.getElementById('complete-banner').className =
    'complete-banner' + (c === TOTAL ? ' show' : '');
}

function openModal(key, b, blk) {
  currentKey = key; currentBooth = b; currentBlock = blk;
  document.getElementById('m-block').textContent = 'BEAUTY COLLECTION — ' + blk.label;
  document.getElementById('m-name').textContent  = b.n;
  const isVisited = visited.has(key);
  document.getElementById('m-visited').className = 'modal-visited-badge' + (isVisited ? ' show' : '');
  const hp = document.getElementById('m-hp');
  if (b.url) { hp.href = b.url; hp.style.display = 'flex'; }
  else        { hp.style.display = 'none'; }
  const chk = document.getElementById('m-chk');
  chk.textContent = isVisited ? '訪問済みを取り消す' : '訪問しました ✓';
  chk.className   = 'btn-check ' + (isVisited ? 'undo' : 'do');
  document.getElementById('modal').className = 'modal-overlay open';
}

function closeModal() {
  document.getElementById('modal').className = 'modal-overlay';
}

document.getElementById('m-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

document.getElementById('m-chk').addEventListener('click', async () => {
  if (!currentKey) return;
  const wasVisited = visited.has(currentKey);
  wasVisited ? visited.delete(currentKey) : visited.add(currentKey);
  localStorage.setItem(lsKey, JSON.stringify([...visited]));
  updateProgress();
  renderMap();
  closeModal();
  if (!wasVisited) {
    showToast('訪問を記録しました');
    sendLog(currentBlock.id, currentBooth.n);
  }
});

async function sendLog(blockId, boothName) {
  if (!rowId) return;
  try {
    const url = GAS_URL
      + '?mode=checkin'
      + '&id='    + encodeURIComponent(rowId)
      + '&un='    + encodeURIComponent(un)
      + '&sn='    + encodeURIComponent(sn)
      + '&block=' + encodeURIComponent(blockId)
      + '&booth=' + encodeURIComponent(boothName);
    await fetch(url, { method: 'GET', mode: 'no-cors' });
  } catch(err) {
    console.warn('ログ送信失敗（端末には保存済み）:', err);
  }
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

init();
</script>
</body>
</html>
